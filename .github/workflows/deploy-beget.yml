name: Deploy to Beget

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.BEGET_SSH_KEY }}" > ~/.ssh/beget_deploy_key
          chmod 600 ~/.ssh/beget_deploy_key
          ssh-keyscan -p "${{ secrets.BEGET_PORT }}" "${{ secrets.BEGET_HOST }}" >> ~/.ssh/known_hosts

      - name: Check SSH connection
        shell: bash
        run: |
          ssh -i ~/.ssh/beget_deploy_key \
            -p "${{ secrets.BEGET_PORT }}" \
            "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}" \
            "mkdir -p '${{ secrets.BEGET_PATH }}' && echo 'Beget SSH connection OK'"

      - name: Deploy files
        shell: bash
        run: |
          rsync -rlgoDzvc --delete \
            -e "ssh -i ~/.ssh/beget_deploy_key -p ${{ secrets.BEGET_PORT }}" \
            --include='vendor/' \
            --include='vendor/ishop/' \
            --include='vendor/ishop/core/***' \
            --exclude='vendor/***' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='.git.corrupt-*' \
            --exclude='.idea/' \
            --exclude='archive/' \
            --exclude='tmp/' \
            --include='public/cron/' \
            --include='public/cron/run_task_cli.php' \
            --exclude='public/cron/***' \
            --exclude='public/xls/' \
            --exclude='public/xml/' \
            --exclude='public/storage/' \
            --exclude='public/uploads/' \
            --exclude='config/api.php' \
            --exclude='config/config_db.php' \
            --exclude='config/config_db_tamozh.php' \
            --exclude='config/params.php' \
            ./ "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:${{ secrets.BEGET_PATH }}/"

      - name: Install Composer dependencies
        shell: bash
        run: |
          ssh -i ~/.ssh/beget_deploy_key \
            -p "${{ secrets.BEGET_PORT }}" \
            "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}" \
            "cd '${{ secrets.BEGET_PATH }}' && composer-php7.4 install --no-dev --no-interaction --optimize-autoloader"

      - name: Add article content
        shell: bash
        run: |
          ssh -i ~/.ssh/beget_deploy_key \
            -p "${{ secrets.BEGET_PORT }}" \
            "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}" \
            "cd '${{ secrets.BEGET_PATH }}' && (php8.2 scripts/add_content_image_source.php || php8.1 scripts/add_content_image_source.php || php7.4 scripts/add_content_image_source.php || php scripts/add_content_image_source.php) && (php8.2 scripts/add_tire_wear_article.php || php8.1 scripts/add_tire_wear_article.php || php7.4 scripts/add_tire_wear_article.php || php scripts/add_tire_wear_article.php) && (php8.2 scripts/add_tire_pressure_monitoring_article.php || php8.1 scripts/add_tire_pressure_monitoring_article.php || php7.4 scripts/add_tire_pressure_monitoring_article.php || php scripts/add_tire_pressure_monitoring_article.php)"

      - name: Inventory API production shadow smoke test
        shell: bash
        run: |
          ssh -i ~/.ssh/beget_deploy_key \
            -p "${{ secrets.BEGET_PORT }}" \
            "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}" \
            "cd '${{ secrets.BEGET_PATH }}' && php8.2 bin/sync_inventory_api.php --id=36 --categories=* --mode=live --article=11141 --require-api=1 && php8.2 bin/export_inventory_csv.php --mirror-dir=/home/s/shinaspec/its50.ru/public_html/xls/nalichie"
