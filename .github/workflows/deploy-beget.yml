name: Deploy to Beget

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.BEGET_SSH_KEY }}" > ~/.ssh/beget_deploy_key
          chmod 600 ~/.ssh/beget_deploy_key
          ssh-keyscan -p "${{ secrets.BEGET_PORT }}" "${{ secrets.BEGET_HOST }}" >> ~/.ssh/known_hosts

      - name: Check SSH connection
        shell: bash
        run: |
          ssh -i ~/.ssh/beget_deploy_key \
            -p "${{ secrets.BEGET_PORT }}" \
            "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}" \
            "mkdir -p '${{ secrets.BEGET_PATH }}' && echo 'Beget SSH connection OK'"

      - name: Deploy files
        shell: bash
        run: |
          rsync -rlgoDzvc --delete \
            -e "ssh -i ~/.ssh/beget_deploy_key -p ${{ secrets.BEGET_PORT }}" \
            --include='vendor/' \
            --include='vendor/ishop/' \
            --include='vendor/ishop/core/***' \
            --exclude='vendor/***' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='.git.corrupt-*' \
            --exclude='.idea/' \
            --exclude='archive/' \
            --exclude='tmp/' \
            --exclude='public/cron/' \
            --exclude='public/xls/' \
            --exclude='public/xml/' \
            --exclude='public/storage/' \
            --exclude='public/uploads/' \
            --exclude='config/api.php' \
            --exclude='config/config_db.php' \
            --exclude='config/config_db_tamozh.php' \
            --exclude='config/params.php' \
            ./ "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:${{ secrets.BEGET_PATH }}/"

      - name: Install Composer dependencies
        shell: bash
        run: |
          ssh -i ~/.ssh/beget_deploy_key \
            -p "${{ secrets.BEGET_PORT }}" \
            "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}" \
            "cd '${{ secrets.BEGET_PATH }}' && composer-php7.4 install --no-dev --no-interaction --optimize-autoloader"

      - name: Add tire wear article
        shell: bash
        run: |
          ssh -i ~/.ssh/beget_deploy_key \
            -p "${{ secrets.BEGET_PORT }}" \
            "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}" \
            "cd '${{ secrets.BEGET_PATH }}' && (php8.2 scripts/add_content_image_source.php || php8.1 scripts/add_content_image_source.php || php7.4 scripts/add_content_image_source.php || php scripts/add_content_image_source.php) && (php8.2 scripts/add_tire_wear_article.php || php8.1 scripts/add_tire_wear_article.php || php7.4 scripts/add_tire_wear_article.php || php scripts/add_tire_wear_article.php)"

      - name: Regenerate Direct YML feeds
        shell: bash
        run: |
          ssh -i ~/.ssh/beget_deploy_key \
            -p "${{ secrets.BEGET_PORT }}" \
            "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}" \
            "cd '${{ secrets.BEGET_PATH }}' && \
            (php8.2 public/cron/run_task_cli.php --id=34 --cat_id=9 --tiposize=10-16.5 || php8.1 public/cron/run_task_cli.php --id=34 --cat_id=9 --tiposize=10-16.5 || php7.4 public/cron/run_task_cli.php --id=34 --cat_id=9 --tiposize=10-16.5 || php public/cron/run_task_cli.php --id=34 --cat_id=9 --tiposize=10-16.5) && \
            (php8.2 public/cron/run_task_cli.php --id=34 --cat_id=9 --tiposize=12-16.5 || php8.1 public/cron/run_task_cli.php --id=34 --cat_id=9 --tiposize=12-16.5 || php7.4 public/cron/run_task_cli.php --id=34 --cat_id=9 --tiposize=12-16.5 || php public/cron/run_task_cli.php --id=34 --cat_id=9 --tiposize=12-16.5) && \
            (php8.2 public/cron/run_task_cli.php --id=34 --cat_id=19 --tiposize=12.5/80-18 || php8.1 public/cron/run_task_cli.php --id=34 --cat_id=19 --tiposize=12.5/80-18 || php7.4 public/cron/run_task_cli.php --id=34 --cat_id=19 --tiposize=12.5/80-18 || php public/cron/run_task_cli.php --id=34 --cat_id=19 --tiposize=12.5/80-18) && \
            (php8.2 public/cron/run_task_cli.php --id=34 --cat_id=19 --tiposize=16.9-24 || php8.1 public/cron/run_task_cli.php --id=34 --cat_id=19 --tiposize=16.9-24 || php7.4 public/cron/run_task_cli.php --id=34 --cat_id=19 --tiposize=16.9-24 || php public/cron/run_task_cli.php --id=34 --cat_id=19 --tiposize=16.9-24) && \
            (php8.2 public/cron/run_task_cli.php --id=34 --cat_id=19 --tiposize=16.9-28 || php8.1 public/cron/run_task_cli.php --id=34 --cat_id=19 --tiposize=16.9-28 || php7.4 public/cron/run_task_cli.php --id=34 --cat_id=19 --tiposize=16.9-28 || php public/cron/run_task_cli.php --id=34 --cat_id=19 --tiposize=16.9-28) && \
            (php8.2 public/cron/run_task_cli.php --id=34 --cat_id=20 --tiposize=17.5-25 || php8.1 public/cron/run_task_cli.php --id=34 --cat_id=20 --tiposize=17.5-25 || php7.4 public/cron/run_task_cli.php --id=34 --cat_id=20 --tiposize=17.5-25 || php public/cron/run_task_cli.php --id=34 --cat_id=20 --tiposize=17.5-25) && \
            (php8.2 public/cron/run_task_cli.php --id=34 --cat_id=20 --tiposize=23.5-25 || php8.1 public/cron/run_task_cli.php --id=34 --cat_id=20 --tiposize=23.5-25 || php7.4 public/cron/run_task_cli.php --id=34 --cat_id=20 --tiposize=23.5-25 || php public/cron/run_task_cli.php --id=34 --cat_id=20 --tiposize=23.5-25)"
